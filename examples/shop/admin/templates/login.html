{{define "login"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — Sign in</title>
<style>
:root{--bg:#fff;--fg:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--panel:#f9fafb;--danger:#dc2626}
@media (prefers-color-scheme:dark){:root{--bg:#0f1115;--fg:#e5e7eb;--muted:#9ca3af;--line:#232733;--accent:#60a5fa;--panel:#161a22;--danger:#f87171}}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--fg);background:var(--bg)}
.card{width:320px;border:1px solid var(--line);border-radius:12px;padding:28px;background:var(--panel)}
h1{margin:0 0 4px;font-size:18px}
.sub{color:var(--muted);margin-bottom:20px;font-size:13px}
label{display:block;font-weight:600;margin:14px 0 4px;font-size:13px}
input{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:var(--bg);color:var(--fg);font:inherit}
button{width:100%;margin-top:20px;padding:10px;border:0;border-radius:7px;background:var(--accent);color:#fff;font:inherit;font-weight:600;cursor:pointer}
.err{margin-bottom:16px;padding:9px 11px;border:1px solid var(--danger);color:var(--danger);border-radius:7px;font-size:13px}
</style>
</head>
<body>
<form class="card" method="post" action="{{.Prefix}}/login">
  <h1>{{.Title}}</h1>
  <div class="sub">Admin panel</div>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <input type="hidden" name="next" value="{{.Next}}">
  <label for="u">Username</label>
  <input id="u" name="username" autocomplete="username" autofocus>
  <label for="p">Password</label>
  <input id="p" name="password" type="password" autocomplete="current-password">
  <button type="submit">Sign in</button>
</form>
</body>
</html>{{end}}
